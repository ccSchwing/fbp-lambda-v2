AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: FBPService
Parameters:
  FBPUsersTableName:
    Type: String
    Default: FBP-Users
  FBPConfigTableName:
    Type: String
    Default: FBP-Config
  FBPScheduleTableName:
    Type: String
    Default: 2025-Schedule
  FBPPicksTableName:
    Type: String
    Default: FBP-Picks
  FBPLogsTableName:
    Type: String
    Default: 2025-Log
  FBPWeeklyResultsTableName:
    Type: String
    Default: FBP-Weekly-Results
  FBPWeeklyResultsWeekIndexName:
    Type: String
    Default: WeekIndex
  S3BucketName:
    Type: String
    Default: my-fbp.com
Resources:
  FBPLibLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: fbplib
      Description: Shared FBP Python utility library
      ContentUri: FBPLibLayer
      CompatibleRuntimes:
      - python3.14
    Metadata:
      BuildMethod: python3.14
      SamResourceId: FBPLibLayer
  UpdateWeeklyResultsPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UpdateWeeklyResultsPython
      Handler: UpdateWeeklyResults.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPWeeklyResultsTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPPicksTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: 2025-Schedule
      Environment:
        Variables:
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPWeeklyResultsTableName:
            Ref: FBPWeeklyResultsTableName
          FBPScheduleTableName:
            Ref: FBPScheduleTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        UpdateWeeklyResultsGET:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /updateWeeklyResults
            Method: GET
            PayloadFormatVersion: '2.0'
        UpdateWeeklyResultsOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /updateWeeklyResults
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: UpdateWeeklyResultsPython
  CalcWeeklyResultsPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CalcWeeklyResultsPython
      Handler: CalcWeeklyResults.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPWeeklyResultsTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPPicksTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      Environment:
        Variables:
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPWeeklyResultsTableName:
            Ref: FBPWeeklyResultsTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        CalcWeeklyResultsGET:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /calcWeeklyResults
            Method: GET
            PayloadFormatVersion: '2.0'
        CalcWeeklyResultsOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /calcWeeklyResults
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: CalcWeeklyResultsPython
  GetWeeklyResultsPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetWeeklyResultsPython
      Handler: GetWeeklyResults.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPWeeklyResultsTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPPicksTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      Environment:
        Variables:
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPWeeklyResultsTableName:
            Ref: FBPWeeklyResultsTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        GetWeeklyResultsGET:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getWeeklyResults
            Method: GET
            PayloadFormatVersion: '2.0'
        GetWeeklyResultsOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getWeeklyResults
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: GetWeeklyResultsPython
  SaveFBPPicksPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SaveFBPPicksPython
      Handler: SaveFBPPicks.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPPicksTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName:
            Ref: FBPConfigTableName
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        SaveFBPPicksPOST:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /saveFBPPicks
            Method: POST
            PayloadFormatVersion: '2.0'
        SaveFBPPicksOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /saveFBPPicks
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: SaveFBPPicksPython
  GetPickSheetPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetPickSheetPython
      Handler: GetPickSheet.lambda_handler
      Runtime: python3.14
      MemorySize: 1024
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPScheduleTableName
      Environment:
        Variables:
          FBPConfigTableName:
            Ref: FBPConfigTableName
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPScheduleTableName:
            Ref: FBPScheduleTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        GetPickSheetGET:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getPickSheet
            Method: GET
            PayloadFormatVersion: '2.0'
        GetPickSheetOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getPickSheet
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: GetPickSheetPython
  GetPoolOpenEvent:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetPoolOpenEvent
      Handler: GetPoolOpenEvent.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Events:
        GetPoolOpen:
          Type: HttpApi
          Properties:
            Path: /getPoolOpen
            Method: GET
    Metadata:
      SamResourceId: GetPoolOpenEvent
  GetPoolConfig:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetPoolConfig
      Handler: GetPoolConfig.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Events:
        GetPoolConfig:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getPoolConfig
            Method: GET
    Metadata:
      SamResourceId: GetPoolConfig
  MyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowHeaders:
        - Content-Type
        - X-Amz-Date
        - Authorization
        - X-Api-Key
        - X-Amz-Security-Token
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        MaxAge: 300
        AllowCredentials: false
  SetPoolStatusOpen:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SetPoolStatusOpen
      Handler: SetPoolStatus.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      Environment:
        Variables:
          FBPConfigTableName:
            Ref: FBPConfigTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        SetPoolStatusOpenPOST:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /setPoolStatusOpen
            Method: POST
            PayloadFormatVersion: '2.0'
        SetPoolStatusOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /setPoolStatusOpen
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: SetPoolStatusOpen
  SetPoolStatusClosed:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SetPoolStatusClosed
      Handler: SetPoolStatus.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        SetPoolStatusClosedPOST:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /setPoolStatusClosed
            Method: POST
            PayloadFormatVersion: '2.0'
        SetPoolStatusClosedOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /setPoolStatusClosed
            Method: OPTIONS
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: SetPoolStatusClosed
  GetFBPUserPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFBPUserPython
      Handler: GetFBPUser.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      Environment:
        Variables:
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Events:
        GetFBPUserPython:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getFBPUserPython
            Method: POST
            PayloadFormatVersion: '2.0'
      Layers:
      - Ref: FBPLibLayer
    Metadata:
      SamResourceId: GetFBPUserPython
  UpdateFBPUserPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UpdateFBPUserPython
      Handler: AddOrUpdateFBPUser.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      Environment:
        Variables:
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Events:
        UpdateFBPUserPython:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /updateFBPUser
            Method: POST
            PayloadFormatVersion: '2.0'
      Layers:
      - Ref: FBPLibLayer
    Metadata:
      SamResourceId: UpdateFBPUserPython
  AddFBPUserPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: AddFBPUserPython
      Handler: AddOrUpdateFBPUser.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      Environment:
        Variables:
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Events:
        AddFBPUserPython:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /addFBPUser
            Method: POST
            PayloadFormatVersion: '2.0'
      Layers:
      - Ref: FBPLibLayer
    Metadata:
      SamResourceId: AddFBPUserPython
  GetFBPPicksPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFBPPicksPython
      Handler: GetFBPPicksPython.lambda_handler
      Runtime: python3.14
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPPicksTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      Environment:
        Variables:
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
      Layers:
      - Ref: FBPLibLayer
      Events:
        GetFBPPicksPython:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getFBPPicksPython
            Method: POST
            PayloadFormatVersion: '2.0'
    Metadata:
      SamResourceId: GetFBPPicksPython
  GetAllFBPPicksPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetAllFBPPicksPython
      Handler: GetAllFBPPicks.lambda_handler
      Runtime: python3.14
      Architectures:
      - x86_64
      Layers:
      - Ref: FBPLibLayer
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPPicksTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FBPLogsTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPUsersTableName
      - DynamoDBReadPolicy:
          TableName:
            Ref: FBPConfigTableName
      - Statement:
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource:
            Fn::GetAtt:
            - GetPoolConfig
            - Arn
      Environment:
        Variables:
          FBPPicksTableName:
            Ref: FBPPicksTableName
          FBPLogsTableName:
            Ref: FBPLogsTableName
          FBPUsersTableName:
            Ref: FBPUsersTableName
          FBPConfigTableName:
            Ref: FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION:
            Ref: GetPoolConfig
      Events:
        GetAllFBPPicksPython:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getAllFBPPicks
            Method: GET
            PayloadFormatVersion: '2.0'
        GetAllFBPPicksPythonOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: MyHttpApi
            Path: /getAllFBPPicks
            Method: OPTIONS
    Metadata:
      SamResourceId: GetAllFBPPicksPython
Outputs:
  HttpAPiUrl:
