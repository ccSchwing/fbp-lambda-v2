  UpdateFBPUserPythonEndpoint:
    Description: UpdateFBPUserPython API Endpoint
    Value:
      Fn::Sub: https://${MyHttpApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/updateFBPUser
    Export:
