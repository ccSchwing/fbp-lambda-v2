  SaveFBPPicksPythonFunction:
    Description: SaveFBPPicksPython Lambda Function ARN
    Value:
      Fn::GetAtt:
      - SaveFBPPicksPython
      - Arn
  SaveFBPPicksPythonApi:
    Description: SaveFBPPicksPython API Endpoint
