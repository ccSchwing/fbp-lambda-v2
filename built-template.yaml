    Export:
      Name:
        Fn::Sub: ${AWS::StackName}-SaveFBPPicksApi
  GetPickSheetPythonFunction:
    Description: GetPickSheetPython Lambda Function ARN
    Value:
      Fn::GetAtt:
      - GetPickSheetPython
